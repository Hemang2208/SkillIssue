            <p>Skill Issue is the open marketplace for AI skills. Discover, build, share and combine AI skills for Claude, ChatGPT, Gemini, Cursor, Copilot and more.</p>

            <h2>What Are AI Skills?</h2>
            <p>AI skills are structured markdown instruction files that give AI agents precise, actionable capabilities for specific tasks. Think of them as apps, but for AI — install a skill and your AI agent instantly becomes better at that task.</p>

            <h2>How It Works</h2>

            <h2>Frequently Asked Questions</h2>
            <h3>What are AI skills?</h3>
            <p>AI skills are markdown (.md) instruction files that give AI agents like Claude, ChatGPT, Gemini, and Cursor specific expertise. They contain structured prompts, rules, and examples that make your AI agent expert-level at a particular task.</p>

            <h3>How do I use a skill?</h3>
            <p>Copy or download the skill file, then paste it into your AI agent's system prompt or project instructions. The agent immediately gains the capability described in the skill.</p>

            <h3>Is Skill Issue free?</h3>
            <p>Yes! Browsing, downloading, and using skills is completely free. You can also create and share your own skills at no cost.</p>

            <h3>Which AI agents are supported?</h3>
            <p>Skills work with any AI agent that accepts text instructions, including Claude (Anthropic), ChatGPT (OpenAI), Gemini (Google), Cursor, GitHub Copilot, and more.</p>
